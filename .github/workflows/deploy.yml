name: Build and Deploy Quarto Site

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # daily update (data refresh)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run data ingestion
        run: python scripts/ingest_data.py

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/

      - name: Lint code
        run: |
          pip install ruff
          ruff check .

      - name: Spell check (markdown)
        run: |
          pip install codespell
          codespell .

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
