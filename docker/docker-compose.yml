version: "3.9"

services:
  api:
    build: .
    container_name: netload-forecast-api
    ports:
      - "8000:8000"
    volumes:
      # Persist trained models across container restarts
      - models_data:/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  models_data:
    driver: local